<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beetfolio — 資産ダッシュボード</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="aurora-bg"></div>
  <div class="grain"></div>

  <div class="app">
    <!-- ============ SIDEBAR ============ -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 32 32" width="22" height="22" aria-hidden="true">
            <path d="M16 2 L28 9 V23 L16 30 L4 23 V9 Z" fill="none" stroke="url(#bg1)" stroke-width="2"/>
            <circle cx="16" cy="16" r="5" fill="url(#bg1)"/>
            <defs><linearGradient id="bg1" x1="0" y1="0" x2="32" y2="32">
              <stop offset="0" stop-color="#a78bfa"/><stop offset="0.5" stop-color="#ff4d9d"/><stop offset="1" stop-color="#2de2e6"/>
            </linearGradient></defs>
          </svg>
        </div>
        <span class="brand-name">BEETFOLIO</span>
      </div>

      <nav class="nav" id="nav">
        <a class="nav-item" data-route="dashboard"><span class="ni-icon">◰</span> ダッシュボード</a>
        <a class="nav-item" data-route="networth"><span class="ni-icon">◈</span> 総資産</a>
        <a class="nav-item" data-route="crypto"><span class="ni-icon">₿</span> 暗号資産</a>
        <a class="nav-item" data-route="stocks"><span class="ni-icon">▤</span> 株式・投信</a>
        <a class="nav-item" data-route="bank"><span class="ni-icon">▦</span> 銀行・現金</a>
        <a class="nav-item" data-route="analytics"><span class="ni-icon">◐</span> 分析</a>
        <a class="nav-item" data-route="transactions"><span class="ni-icon">⇄</span> 入出金</a>
        <a class="nav-item" data-route="settings"><span class="ni-icon">⚙</span> 設定</a>
      </nav>

      <div class="upgrade-card">
        <div class="uc-orb">
          <div class="scene"><div class="cube">
            <div class="cf f1"></div><div class="cf f2"></div><div class="cf f3"></div>
            <div class="cf f4"></div><div class="cf f5"></div><div class="cf f6"></div>
          </div></div>
        </div>
        <div class="uc-title">API連携を追加</div>
        <div class="uc-sub">取引所・証券・銀行口座を<br/>自動で同期。</div>
        <button class="uc-btn" id="connectBtn">+ 口座を接続</button>
      </div>

      <div class="sys-status">
        <div class="ss-head"><span>同期ステータス</span><span class="dot ok"></span></div>
        <div class="ss-sub" id="syncSub">最終同期 — • 全口座 正常</div>
      </div>
    </aside>

    <!-- ============ MAIN ============ -->
    <main class="main">
      <header class="topbar">
        <div class="welcome">
          <h1 id="pageTitle">ダッシュボード</h1>
          <p id="pageSub">今日のあなたの資産状況です。</p>
        </div>
        <div class="topbar-right">
          <div class="market-status">
            <span class="dot ok"></span>
            <div>
              <div class="ms-label">マーケット稼働中</div>
              <div class="ms-time" id="clock">—</div>
            </div>
          </div>
          <button class="icon-btn" id="syncBtn" title="価格を更新">⟳</button>
          <button class="icon-btn" id="searchBtn" aria-label="検索">⌕</button>
          <button class="icon-btn badge" id="notifBtn" aria-label="通知">◔<span class="badge-dot">3</span></button>
          <div class="profile" id="profileBtn">
            <div class="avatar" id="avatar">TK</div>
            <div class="pf-name" id="pfName">Trader K. <span class="caret">▾</span></div>
          </div>
        </div>
      </header>

      <section id="view"></section>
    </main>
  </div>

  <script src="store.js"></script>
  <script src="charts.js"></script>
  <script src="components.js"></script>
  <script src="app.js"></script>
</body>
</html>
