<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beetfolio — 資産ダッシュボード</title>
  <script>try{document.documentElement.dataset.theme=localStorage.getItem("beetfolio:theme")||"light";}catch(e){document.documentElement.dataset.theme="light";}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="aurora-bg"></div>
  <div class="grain"></div>

  <div class="app">
    <!-- ============ SIDEBAR ============ -->
    <aside class="sidebar">
      <div class="brand" data-route="dashboard" title="ダッシュボードへ">
        <span class="brand-mark">
          <svg viewBox="0 0 118 100" width="42" height="36" aria-hidden="true">
            <defs>
              <linearGradient id="bBars" x1="0" y1="100" x2="40" y2="20" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#ff2d9b"/><stop offset="0.5" stop-color="#c026d3"/><stop offset="1" stop-color="#7c3aed"/>
              </linearGradient>
              <linearGradient id="bB" x1="40" y1="14" x2="110" y2="92" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#4a23a8"/><stop offset="1" stop-color="#7c3aed"/>
              </linearGradient>
              <linearGradient id="bLeaf" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#34d36b"/><stop offset="1" stop-color="#11a34a"/>
              </linearGradient>
            </defs>
            <!-- fanned chart bars -->
            <rect x="2"  y="52" width="9" height="28" rx="4.5" fill="url(#bBars)" transform="rotate(-17 6.5 80)"/>
            <rect x="12" y="40" width="9" height="40" rx="4.5" fill="url(#bBars)" transform="rotate(-9 16.5 80)"/>
            <rect x="22" y="28" width="9" height="52" rx="4.5" fill="url(#bBars)" transform="rotate(-3 26.5 80)"/>
            <!-- B letterform -->
            <text x="36" y="84" font-family="'Plus Jakarta Sans','Poppins',sans-serif" font-weight="800" font-size="84" fill="url(#bB)">B</text>
            <!-- leaf -->
            <path d="M58 78 C47 71 48 54 67 49 C68 67 67 73 58 78 Z" fill="url(#bLeaf)"/>
            <path d="M61 74 C60 64 62 57 66 52" fill="none" stroke="#eafff1" stroke-width="2" stroke-linecap="round" opacity=".85"/>
          </svg>
        </span>
        <span class="brand-name">Beetfolio</span>
      </div>

      <nav class="nav" id="nav">
        <a class="nav-item" data-route="dashboard"><span class="ni-icon">◰</span> ダッシュボード</a>
        <a class="nav-item" data-route="networth"><span class="ni-icon">◈</span> 総資産</a>
        <a class="nav-item" data-route="crypto"><span class="ni-icon">₿</span> 暗号資産</a>
        <a class="nav-item" data-route="stocks"><span class="ni-icon">▤</span> 株式・投信</a>
        <a class="nav-item" data-route="bank"><span class="ni-icon">▦</span> 銀行・現金</a>
        <a class="nav-item" data-route="analytics"><span class="ni-icon">◐</span> 分析</a>
        <a class="nav-item" data-route="transactions"><span class="ni-icon">⇄</span> 入出金</a>
        <a class="nav-item" data-route="settings"><span class="ni-icon">⚙</span> 設定</a>
      </nav>

      <div class="upgrade-card">
        <div class="uc-orb">
          <div class="scene">
            <div class="planet"><span class="planet-shine"></span></div>
            <div class="orbit"><span class="moon"></span></div>
            <div class="orbit orbit-2"></div>
          </div>
        </div>
        <div class="uc-title">API連携を追加</div>
        <div class="uc-sub">取引所・証券・銀行口座を<br/>自動で同期。</div>
        <button class="uc-btn" id="connectBtn">+ 口座を接続</button>
      </div>

      <div class="sys-status">
        <div class="ss-head"><span>同期ステータス</span><span class="dot ok"></span></div>
        <div class="ss-sub" id="syncSub">最終同期 — • 全口座 正常</div>
      </div>
    </aside>

    <!-- ============ MAIN ============ -->
    <main class="main">
      <header class="topbar">
        <div class="welcome">
          <h1 id="pageTitle">ダッシュボード</h1>
          <p id="pageSub">今日のあなたの資産状況です。</p>
        </div>
        <div class="topbar-right">
          <div class="market-status">
            <span class="dot ok"></span>
            <div>
              <div class="ms-label">マーケット稼働中</div>
              <div class="ms-time" id="clock">—</div>
            </div>
          </div>
          <button class="icon-btn" id="themeBtn" title="テーマ切替">☾</button>
          <button class="icon-btn" id="syncBtn" title="価格を更新">⟳</button>
          <button class="icon-btn" id="searchBtn" aria-label="検索">⌕</button>
          <button class="icon-btn badge" id="notifBtn" aria-label="通知">◔<span class="badge-dot">3</span></button>
          <div class="profile" id="profileBtn">
            <div class="avatar" id="avatar">TK</div>
            <div class="pf-name" id="pfName">Trader K. <span class="caret">▾</span></div>
          </div>
        </div>
      </header>

      <section id="view"></section>
    </main>
  </div>

  <script src="store.js"></script>
  <script src="charts.js"></script>
  <script src="components.js"></script>
  <script src="app.js"></script>
</body>
</html>
